<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand" aria-label="Hey pookie ordering">
        <span class="brand-mark" aria-hidden="true">❤</span>
        <div>
          <h1>Hey pookie</h1>
        </div>
      </div>
      <button class="reset-link" type="button" id="resetButton" aria-label="Refresh page">TTYL?</button>
    </header>

    <div class="layout">
      <section class="conversation" aria-labelledby="conversationTitle">
        <h2 class="conversation-title" id="conversationTitle">Conversation</h2>
        <div class="chat-log" id="chatLog" aria-live="polite"></div>

        <form class="reply-form" id="replyForm" autocomplete="off">
          <label for="replyInput">Your answer</label>
          <div class="input-line">
            <input id="replyInput" name="reply" type="text" maxlength="120" placeholder="Type your reply" required>
            <button class="primary-btn" type="submit">Send</button>
          </div>
        </form>

        <div class="heart-zone hidden" id="heartZone">
          <button class="heart-btn" id="heartButton" type="button" aria-label="Touch my heart" aria-describedby="heartHint"><span class="heart-glyph" aria-hidden="true">❤</span></button>
          <span class="heart-label" id="heartHint">Touch my heart</span>
        </div>

        <div class="country-panel hidden" id="countryPanel">
          <label for="countrySelect">Import flowers from</label>
          <div class="country-line">
            <select id="countrySelect"></select>
            <button class="order-btn hidden" id="orderButton" type="button">Order</button>
          </div>
        </div>
      </section>

      <section class="catalog-panel" aria-labelledby="catalogTitle">
        <div class="panel-head">
          <div>
            <h2 class="panel-title" id="catalogTitle">Ranked flowers</h2>
            <p class="panel-copy" id="panelCopy">Choose a country after the heart appears.</p>
          </div>
          <span class="status-pill" id="apiStatus">Loading catalog</span>
        </div>
        <div id="flowerOutput">
          <div class="empty-state">
            <div>
              <strong>No country selected yet</strong>
              Start with the chat, then pick a country to see the roses.
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="notice" id="toast" role="status" aria-live="polite"></div>

  <script nonce="cm9zZS1sb3ZlLWFwcA==">
    "use strict";

    /*

      A no-key public rose commerce API with rose shape, rating, shop location, and
      downloadable images is not broadly available, so this app uses the mock-API
      pathway requested in the brief. MOCK_API_URL is deliberately isolated so it
      can be swapped for a real endpoint later without rewriting the UI.
    */
    const MOCK_API_URL = "https://mocki.io/v1/d4867d8b-b5d5-4a48-a4ab-79131b5809b8";
    const TRUSTED_IMAGE_ORIGINS = new Set([
      "https://commons.wikimedia.org",

    const chatLog = document.getElementById("chatLog");

    const replyInput = document.getElementById("replyInput");
    const heartZone = document.getElementById("heartZone");

    const countryPanel = document.getElementById("countryPanel");

    document.addEventListener("DOMContentLoaded", () => {
      resetConversation();
      loadRoseCatalog();
    });

    replyForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const sanitizedReply = sanitizeUserText(replyInput.value);
      if (!sanitizedReply) {
        replyInput.value = "";
        replyInput.focus();
        return;
      }

      // Security measure: user text is inserted with textContent only.
      addUserBubble(sanitizedReply);
      replyInput.value = "";
      replyForm.classList.add("hidden");
      addMaleMessage("I got some flowers for you");
      heartZone.classList.remove("hidden");
    });

    heartButton.addEventListener("click", () => {
      populateCountryOptions();
      countryPanel.classList.remove("hidden");
      countrySelect.focus();
    });

    countrySelect.addEventListener("change", () => {
      state.selectedCountry = countrySelect.value;
      orderButton.classList.toggle("hidden", !state.selectedCountry);
    });

    orderButton.addEventListener("click", () => {
      const country = countrySelect.value;
      if (!country) return;

    resetButton.addEventListener("click", () => {
      window.location.reload();
    });

    function resetConversation() {
      chatLog.replaceChildren();
      replyForm.classList.remove("hidden");
      heartZone.classList.add("hidden");
      countryPanel.classList.add("hidden");
      orderButton.classList.add("hidden");
      countrySelect.replaceChildren();
      state.selectedCountry = "";
      replyInput.value = "";
      addMaleMessage("hey there my love");
      replyInput.focus();
    }

    async function loadRoseCatalog() {
      try {
        const response = await fetch(MOCK_API_URL, {
          method: "GET",
          mode: "cors",
          credentials: "omit",
          headers: { "Accept": "application/json" }
        });

        if (!response.ok) {
          throw new Error("Mock API returned a non-OK status.");
        }

        const payload = await response.json();
        const roses = normalizeRosePayload(payload);
        if (!isValidRoseCatalog(roses)) {
          throw new Error("Mock API schema did not match the rose catalog shape.");
        }

        state.roses = rankRoses(roses);
        apiStatus.textContent = "Catalog ready";
      } catch (error) {
        state.roses = rankRoses(FALLBACK_ROSES);
        apiStatus.textContent = "Catalog ready";
      }
    }

    function normalizeRosePayload(payload) {
      if (Array.isArray(payload)) return payload;
      if (payload && Array.isArray(payload.roses)) return payload.roses;
      if (payload && Array.isArray(payload.data)) return payload.data;
      return [];
    }

    function isValidRoseCatalog(roses) {
      return Array.isArray(roses) && roses.length >= 8 && roses.every((rose) => {
        return typeof rose.name === "string" &&
          typeof rose.shape === "string" &&
          Number.isFinite(Number(rose.rating)) &&
          rose.shop &&
          typeof rose.shop.country === "string" &&
          typeof rose.shop.name === "string" &&
          isTrustedImageUrl(rose.imageUrl);
      });
    }

    /*
      Ranking logic:
      Sort rating high-to-low first. Ties are resolved by country alphabetically,
      then shop/name for stable display.
    */
    function rankRoses(roses) {
      return roses
        .filter((rose) => isTrustedImageUrl(rose.imageUrl))
        .map((rose, index) => ({
          id: String(rose.id || `rose-${index + 1}`),
          name: String(rose.name),
          shape: String(rose.shape),
          rating: Number(rose.rating),
          shop: {
            country: String(rose.shop.country),
            name: String(rose.shop.name)
          },
          imageUrl: String(rose.imageUrl)
        }))
        .sort((a, b) => {
          const byRating = b.rating - a.rating;
          if (byRating !== 0) return byRating;

          const locationA = `${a.shop.country} ${a.shop.name}`;
          const locationB = `${b.shop.country} ${b.shop.name}`;
          const byLocation = locationA.localeCompare(locationB);
          if (byLocation !== 0) return byLocation;

          return a.name.localeCompare(b.name);
        });
    }

    function populateCountryOptions() {
      const countries = Array.from(new Set(state.roses.map((rose) => rose.shop.country))).sort();
      countrySelect.replaceChildren();

      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Select a country";
      countrySelect.append(placeholder);

      countries.forEach((country) => {
        const option = document.createElement("option");
        option.value = country;
        option.textContent = country;
        countrySelect.append(option);
      });
    }

    function showFlowersForCountry(country) {
      const flowers = state.roses.filter((rose) => rose.shop.country === country);
      panelCopy.textContent = `${flowers.length} ranked rose choice${flowers.length === 1 ? "" : "s"} from ${country}.`;
      flowerOutput.replaceChildren();

      if (!flowers.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        const message = document.createElement("div");
        const strong = document.createElement("strong");
        strong.textContent = "No roses found";
        message.append(strong, document.createTextNode("Try another country from the list."));
        empty.append(message);
        flowerOutput.append(empty);
        return;
      }

      const grid = document.createElement("div");
      grid.className = "flower-grid";
      flowers.forEach((rose, index) => grid.append(createFlowerCard(rose, index)));
      flowerOutput.append(grid);

      showToast("Look my love you are spoilt of choices click to download");
    }

    function createFlowerCard(rose, rankIndex) {
      const card = document.createElement("article");
      card.className = "flower-card";

      const imageButton = document.createElement("button");
      imageButton.className = "image-button";
      imageButton.type = "button";
      imageButton.setAttribute("aria-label", `Download image for ${rose.name}`);
      imageButton.addEventListener("click", () => downloadRoseImage(rose));

      const img = document.createElement("img");
      img.loading = "lazy";
      img.decoding = "async";
      img.referrerPolicy = "no-referrer";
      img.src = rose.imageUrl;
      img.alt = `${rose.name} rose`;
      imageButton.append(img);

      const body = document.createElement("div");
      body.className = "card-body";

      const name = document.createElement("h3");
      name.className = "flower-name";
      name.textContent = rose.name;

      const meta = document.createElement("div");
      meta.className = "meta";

      const rank = document.createElement("span");
      rank.className = "tag";
      rank.textContent = `Rank #${rankIndex + 1}`;

      const shape = document.createElement("span");
      shape.className = "tag";
      shape.textContent = rose.shape;

      const rating = document.createElement("span");
      rating.className = "tag stars";
      rating.textContent = `${starRating(rose.rating)} ${rose.rating.toFixed(1)}`;

      meta.append(rank, shape, rating);

      const shop = document.createElement("div");
      shop.className = "shop";
      shop.textContent = `${rose.shop.country} - ${rose.shop.name}`;

      body.append(name, meta, shop);
      card.append(imageButton, body);
      return card;
    }

    /*
      Download function:
      The URL is parsed with the URL API, checked against trusted origins, fetched
      as a Blob, then downloaded through a temporary same-document anchor. No eval,
      no user-provided scriptable URL, and filenames are cleaned.
    */
    async function downloadRoseImage(rose) {
      if (!isTrustedImageUrl(rose.imageUrl)) {
        showToast("That image source is not trusted for download.");
        return;
      }

      try {
        const response = await fetch(rose.imageUrl, {
          method: "GET",
          mode: "cors",
          credentials: "omit",
          referrerPolicy: "no-referrer"
        });

        if (!response.ok) {
          throw new Error("Image download failed.");
        }

        const blob = await response.blob();
        if (!blob.type.startsWith("image/")) {
          throw new Error("Downloaded file is not an image.");
        }

        const objectUrl = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = objectUrl;
        link.download = `${safeFileName(rose.name)}.jpg`;
        document.body.append(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(objectUrl), 0);
        showToast(`${rose.name} is downloading.`);
      } catch (error) {
        // Fallback for browsers that block cross-origin blob downloads.
        const link = document.createElement("a");
        link.href = rose.imageUrl;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.download = `${safeFileName(rose.name)}.jpg`;
        document.body.append(link);
        link.click();
        link.remove();
        showToast("Opened the trusted image URL for download.");
      }
    }

    function addMaleMessage(message) {
      const row = document.createElement("div");
      row.className = "chat-row";

      const avatar = document.createElement("span");
      avatar.className = "avatar";
      avatar.setAttribute("aria-label", "Male speaker");
      avatar.textContent = "👨‍🦰";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = message;

      row.append(avatar, bubble);
      chatLog.append(row);
    }

    function addUserBubble(message) {
      const bubble = document.createElement("div");
      bubble.className = "bubble user";
      bubble.textContent = message;
      chatLog.append(bubble);
    }

    /*
      Security measures:
      User input is trimmed, normalized, length-limited, and rendered only via
      textContent. No innerHTML is used for untrusted data.
    */
    function sanitizeUserText(value) {
      return String(value || "")
        .normalize("NFKC")
        .replace(/[\u0000-\u001F\u007F]/g, "")
        .trim()
        .slice(0, 120);
    }

    function isTrustedImageUrl(value) {
      try {
        const url = new URL(String(value));
        return url.protocol === "https:" && TRUSTED_IMAGE_ORIGINS.has(url.origin);
      } catch (error) {
        return false;
      }
    }

    function safeFileName(value) {
      const cleaned = String(value)
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/gi, "-")
        .replace(/^-+|-+$/g, "")
        .toLowerCase();
      return cleaned || "rose";
    }

    function starRating(rating) {
      const fullStars = Math.max(1, Math.min(5, Math.round(rating)));
      return "★".repeat(fullStars) + "☆".repeat(5 - fullStars);
    }

    function showToast(message) {
      window.clearTimeout(state.toastTimer);
      toast.textContent = message;
      toast.classList.add("show");
      state.toastTimer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 3600);
    }
  </script>
</body>
