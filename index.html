<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'nonce-cm9zZS1sb3ZlLWFwcA==' https://cdnjs.cloudflare.com; style-src 'self' 'nonce-cm9zZS1sb3ZlLWFwcA=='; img-src 'self' https://commons.wikimedia.org https://upload.wikimedia.org; connect-src 'self' https://mocki.io https://commons.wikimedia.org https://upload.wikimedia.org; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <title>Hey pookie</title>
  <style nonce="cm9zZS1sb3ZlLWFwcA==">
    :root {
      color-scheme: light;
      --rose: #c83362;
      --rose-dark: #8f1e46;
      --rose-soft: #fff0f5;
      --blush: #ffe7ee;
      --cream: #fffaf7;
      --ink: #34212a;
      --muted: #765b65;
      --leaf: #3c7c61;
      --line: rgba(143, 30, 70, 0.16);
      --shadow: 0 24px 70px rgba(96, 31, 57, 0.16);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 217, 230, 0.95), transparent 34rem),
        linear-gradient(145deg, #fff8fb 0%, #fffaf4 52%, #eef9f1 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 10px 26px rgba(200, 51, 98, 0.18);
      color: var(--rose);
      font-size: 1.35rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.65rem, 4vw, 3rem);
      letter-spacing: 0;
      line-height: 1.05;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .reset-link {
      border: 0;
      background: transparent;
      color: var(--rose-dark);
      text-decoration: underline;
      text-underline-offset: 4px;
      padding: 8px 2px;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .cart-toggle {
      display: inline-grid;
      position: relative;
      min-width: 48px;
      height: 48px;
      place-items: center;
      border: 1px solid rgba(143, 30, 70, 0.18);
      border-radius: 50%;
      background: #ffffff;
      color: var(--rose-dark);
      box-shadow: 0 12px 28px rgba(96, 31, 57, 0.12);
      font-size: 1.25rem;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .cart-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(96, 31, 57, 0.18);
    }

    .cart-badge {
      position: absolute;
      right: -4px;
      top: -5px;
      display: grid;
      min-width: 23px;
      height: 23px;
      place-items: center;
      border: 2px solid #ffffff;
      border-radius: 999px;
      background: var(--rose);
      color: #ffffff;
      padding: 0 6px;
      font-size: 0.72rem;
      font-weight: 900;
      line-height: 1;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 410px) 1fr;
      gap: 22px;
      align-items: start;
    }

    .conversation,
    .catalog-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .conversation {
      position: sticky;
      top: 20px;
      padding: 20px;
    }

    .conversation-title,
    .panel-title {
      margin: 0 0 14px;
      color: var(--rose-dark);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .chat-log {
      display: grid;
      gap: 12px;
      min-height: 168px;
    }

    .chat-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .avatar {
      display: grid;
      flex: 0 0 42px;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 50%;
      background: var(--blush);
      border: 1px solid rgba(200, 51, 98, 0.18);
      font-size: 1.55rem;
    }

    .bubble {
      max-width: 100%;
      padding: 11px 13px;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid rgba(200, 51, 98, 0.13);
      box-shadow: 0 10px 24px rgba(96, 31, 57, 0.08);
    }

    .bubble.user {
      margin-left: 52px;
      background: #f1fff7;
      border-color: rgba(60, 124, 97, 0.18);
    }

    .reply-form {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .reply-form label,
    .country-panel label {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .input-line,
    .country-line {
      display: flex;
      gap: 10px;
    }

    input,
    select {
      min-width: 0;
      width: 100%;
      border: 1px solid rgba(143, 30, 70, 0.22);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 12px 13px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 4px rgba(200, 51, 98, 0.13);
    }

    .primary-btn,
    .order-btn {
      border: 0;
      border-radius: var(--radius);
      background: var(--rose);
      color: #fff;
      padding: 12px 16px;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(200, 51, 98, 0.22);
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .primary-btn:hover,
    .order-btn:hover {
      transform: translateY(-1px);
      background: var(--rose-dark);
      box-shadow: 0 16px 30px rgba(143, 30, 70, 0.24);
    }

    .primary-btn:disabled,
    .order-btn:disabled {
      cursor: not-allowed;
      opacity: 0.62;
      transform: none;
    }

    .heart-zone {
      display: grid;
      gap: 8px;
      place-items: center;
      margin-top: 18px;
    }

    .heart-btn {
      display: grid;
      position: relative;
      isolation: isolate;
      width: 76px;
      height: 76px;
      place-items: center;
      border: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff477e, #d91455);
      color: #ffffff;
      font-size: 2rem;
      box-shadow: 0 18px 40px rgba(217, 20, 85, 0.32);
      transform: translateZ(0);
      transition: transform 180ms ease, box-shadow 180ms ease;
      animation: heartBob 2100ms ease-in-out infinite;
      overflow: visible;
    }

    .heart-btn::before,
    .heart-btn::after {
      position: absolute;
      z-index: 0;
      bottom: 4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255, 125, 166, 0.42);
      box-shadow:
        22px -10px 0 -3px rgba(255, 255, 255, 0.86),
        38px 4px 0 -5px rgba(255, 125, 166, 0.5);
      content: "";
      opacity: 0;
      pointer-events: none;
      animation: heartBubble 1700ms ease-in-out infinite;
    }

    .heart-btn::before {
      left: 4px;
    }

    .heart-btn::after {
      right: 7px;
      animation-delay: 680ms;
      transform: scale(0.78);
    }

    .heart-label {
      color: var(--rose-dark);
      font-size: 0.95rem;
      font-weight: 900;
      text-align: center;
    }

    .heart-glyph {
      position: relative;
      z-index: 1;
    }

    .heart-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 24px 48px rgba(217, 20, 85, 0.4);
    }

    .heart-btn:focus-visible,
    .image-button:focus-visible,
    .cart-toggle:focus-visible,
    .cart-close:focus-visible,
    .cart-quantity-btn:focus-visible,
    .remove-cart-btn:focus-visible,
    .add-cart-btn:focus-visible,
    .checkout-btn:focus-visible,
    .reset-link:focus-visible,
    .primary-btn:focus-visible,
    .order-btn:focus-visible {
      outline: 3px solid rgba(200, 51, 98, 0.36);
      outline-offset: 3px;
    }

    .country-panel {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      padding: 14px;
      border: 1px solid rgba(200, 51, 98, 0.14);
      border-radius: var(--radius);
      background: var(--rose-soft);
    }

    .catalog-panel {
      min-height: 560px;
      padding: 20px;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .panel-copy {
      margin: 0;
      color: var(--muted);
    }

    .status-pill {
      flex: 0 0 auto;
      border: 1px solid rgba(60, 124, 97, 0.18);
      border-radius: 999px;
      background: #f1fff7;
      color: var(--leaf);
      padding: 8px 12px;
      font-size: 0.85rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .empty-state {
      display: grid;
      min-height: 420px;
      place-items: center;
      border: 1px dashed rgba(143, 30, 70, 0.24);
      border-radius: var(--radius);
      background: rgba(255, 240, 245, 0.46);
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }

    .empty-state strong {
      display: block;
      margin-bottom: 4px;
      color: var(--rose-dark);
      font-size: 1.1rem;
    }

    .flower-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .flower-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: 0 16px 34px rgba(96, 31, 57, 0.1);
    }

    .image-button {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: #f8dde7;
    }

    .flower-card img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      transition: transform 220ms ease;
    }

    .image-button:hover img {
      transform: scale(1.035);
    }

    .card-body {
      display: grid;
      gap: 8px;
      padding: 14px;
    }

    .flower-name {
      margin: 0;
      color: var(--rose-dark);
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      border-radius: 999px;
      background: var(--rose-soft);
      color: var(--rose-dark);
      padding: 5px 9px;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .shop {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .card-actions {
      margin-top: 4px;
    }

    .add-cart-btn {
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      background: #fff0f5;
      color: var(--rose-dark);
      padding: 10px 12px;
      font-weight: 900;
      box-shadow: inset 0 0 0 1px rgba(143, 30, 70, 0.14);
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .add-cart-btn:hover {
      transform: translateY(-1px);
      background: #ffe1ec;
      box-shadow: inset 0 0 0 1px rgba(143, 30, 70, 0.22), 0 12px 22px rgba(96, 31, 57, 0.1);
    }

    .stars {
      color: #b36b00;
      font-weight: 900;
      letter-spacing: 0;
    }

    .cart-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(52, 33, 42, 0.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .cart-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .cart-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      width: min(390px, 100%);
      height: 100vh;
      height: 100dvh;
      max-height: 100vh;
      max-height: 100dvh;
      overflow: hidden;
      border-left: 1px solid rgba(143, 30, 70, 0.18);
      background: rgba(255, 250, 252, 0.98);
      box-shadow: -24px 0 58px rgba(96, 31, 57, 0.2);
      transform: translateX(105%);
      transition: transform 260ms ease;
    }

    .cart-panel.open {
      transform: translateX(0);
    }

    .cart-header,
    .cart-footer {
      padding: 18px;
      background: #ffffff;
    }

    .cart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
    }

    .cart-title {
      margin: 0;
      color: var(--rose-dark);
      font-size: 1.12rem;
      line-height: 1.1;
    }

    .cart-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .cart-close {
      display: grid;
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      place-items: center;
      border: 1px solid rgba(143, 30, 70, 0.14);
      border-radius: 50%;
      background: #fff7fa;
      color: var(--rose-dark);
      font-size: 1.35rem;
      line-height: 1;
    }

    .cart-content {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
    }

    .cart-empty {
      display: grid;
      min-height: 220px;
      place-items: center;
      border: 1px dashed rgba(143, 30, 70, 0.22);
      border-radius: var(--radius);
      background: rgba(255, 240, 245, 0.6);
      color: var(--muted);
      padding: 24px;
      text-align: center;
      font-weight: 800;
    }

    .cart-list {
      display: grid;
      gap: 12px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      border: 1px solid rgba(143, 30, 70, 0.14);
      border-radius: var(--radius);
      background: #ffffff;
      padding: 10px;
      box-shadow: 0 12px 26px rgba(96, 31, 57, 0.08);
    }

    .cart-thumb {
      width: 72px;
      height: 72px;
      border-radius: var(--radius);
      object-fit: cover;
      background: #f8dde7;
    }

    .cart-item-main {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .cart-item-name {
      margin: 0;
      color: var(--rose-dark);
      font-size: 0.98rem;
      line-height: 1.2;
    }

    .cart-item-meta {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .cart-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cart-quantity {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(143, 30, 70, 0.16);
      border-radius: 999px;
      background: #fff7fa;
      overflow: hidden;
    }

    .cart-quantity-btn {
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border: 0;
      background: transparent;
      color: var(--rose-dark);
      font-weight: 900;
    }

    .cart-quantity-value {
      min-width: 30px;
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 900;
      text-align: center;
    }

    .remove-cart-btn {
      border: 0;
      background: transparent;
      color: var(--rose-dark);
      padding: 6px 0;
      font-size: 0.86rem;
      font-weight: 900;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .cart-footer {
      display: grid;
      flex: 0 0 auto;
      gap: 12px;
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
    }

    .cart-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 800;
    }

    .checkout-btn {
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--rose), var(--rose-dark));
      color: #ffffff;
      padding: 13px 16px;
      font-weight: 900;
      box-shadow: 0 16px 34px rgba(143, 30, 70, 0.25);
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    .checkout-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 42px rgba(143, 30, 70, 0.3);
    }

    .checkout-btn:disabled {
      cursor: not-allowed;
      opacity: 0.58;
      transform: none;
      box-shadow: none;
    }

    .cart-status {
      min-height: 1.2em;
      color: var(--muted);
      font-size: 0.86rem;
      text-align: center;
    }

    .notice {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 20;
      width: min(520px, calc(100% - 28px));
      padding: 13px 16px;
      border: 1px solid rgba(143, 30, 70, 0.18);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--rose-dark);
      box-shadow: 0 20px 46px rgba(96, 31, 57, 0.2);
      font-weight: 800;
      text-align: center;
      transform: translate(-50%, 130%);
      opacity: 0;
      pointer-events: none;
      transition: transform 220ms ease, opacity 220ms ease;
    }

    .notice.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    .hidden {
      display: none !important;
    }

    @keyframes heartBob {
      0%,
      100% {
        translate: 0 0;
      }

      50% {
        translate: 0 -5px;
      }
    }

    @keyframes heartBubble {
      0% {
        opacity: 0;
        transform: translateY(14px) scale(0.55);
      }

      24% {
        opacity: 0.85;
      }

      100% {
        opacity: 0;
        transform: translateY(-42px) scale(1.12);
      }
    }

    @media (max-width: 840px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .conversation {
        position: static;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 20px, 1120px);
        padding-top: 18px;
        padding-bottom: calc(86px + env(safe-area-inset-bottom));
      }

      .panel-head,
      .input-line,
      .country-line {
        align-items: stretch;
        flex-direction: column;
      }

      .topbar {
        align-items: center;
      }

      .reset-link {
        position: fixed;
        right: 10px;
        bottom: calc(10px + env(safe-area-inset-bottom));
        left: 10px;
        z-index: 30;
        display: grid;
        min-height: 48px;
        place-items: center;
        border: 1px solid rgba(143, 30, 70, 0.18);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 18px 38px rgba(96, 31, 57, 0.2);
        text-decoration: none;
        backdrop-filter: blur(12px);
      }

      .notice {
        bottom: calc(76px + env(safe-area-inset-bottom));
      }

      .conversation,
      .catalog-panel {
        padding: 14px;
      }

      .status-pill {
        width: fit-content;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .heart-btn,
      .heart-btn::before,
      .heart-btn::after,
      .flower-card img,
      .notice {
        animation: none;
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand" aria-label="Hey pookie ordering">
        <span class="brand-mark" aria-hidden="true">❤</span>
        <div>
          <h1>Hey pookie</h1>
        </div>
      </div>
      <div class="top-actions">
        <button class="cart-toggle" type="button" id="cartToggle" aria-label="Open cart" aria-controls="cartPanel" aria-expanded="false">
          <span aria-hidden="true">&hearts;</span>
          <span class="sr-only">Cart</span>
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
        <button class="reset-link" type="button" id="resetButton" aria-label="Refresh page">TTYL?</button>
      </div>
    </header>

    <div class="layout">
      <section class="conversation" aria-labelledby="conversationTitle">
        <h2 class="conversation-title" id="conversationTitle">Conversation</h2>
        <div class="chat-log" id="chatLog" aria-live="polite"></div>

        <form class="reply-form" id="replyForm" autocomplete="off">
          <label for="replyInput">Your answer</label>
          <div class="input-line">
            <input id="replyInput" name="reply" type="text" maxlength="120" placeholder="Type your reply" required>
            <button class="primary-btn" type="submit">Send</button>
          </div>
        </form>

        <div class="heart-zone hidden" id="heartZone">
          <button class="heart-btn" id="heartButton" type="button" aria-label="Touch my heart" aria-describedby="heartHint"><span class="heart-glyph" aria-hidden="true">❤</span></button>
          <span class="heart-label" id="heartHint">Touch my heart</span>

    async function loadRoseCatalog() {
      try {
        const response = await fetch(MOCK_API_URL, {
          method: "GET",
          mode: "cors",
          credentials: "omit",
          headers: { "Accept": "application/json" }
        });

        if (!response.ok) {
          throw new Error("Mock API returned a non-OK status.");

        const payload = await response.json();
        const roses = normalizeRosePayload(payload);
        if (!isValidRoseCatalog(roses)) {
          throw new Error("Mock API schema did not match the rose catalog shape.");

        state.roses = rankRoses(roses);
        apiStatus.textContent = "Catalog ready";

        renderCart();
      }

    function normalizeRosePayload(payload) {
      if (Array.isArray(payload)) return payload;
      if (payload && Array.isArray(payload.roses)) return payload.roses;
      if (payload && Array.isArray(payload.data)) return payload.data;
      return [];
    }

    function isValidRoseCatalog(roses) {
      return Array.isArray(roses) && roses.length >= 8 && roses.every((rose) => {
        return typeof rose.name === "string" &&
          typeof rose.shape === "string" &&
          Number.isFinite(Number(rose.rating)) &&
          rose.shop &&
          typeof rose.shop.country === "string" &&
          typeof rose.shop.name === "string" &&
          isTrustedImageUrl(rose.imageUrl);

    /*
      Ranking logic:
      Sort rating high-to-low first. Ties are resolved by country alphabetically,

    function rankRoses(roses) {
      return roses
        .filter((rose) => isTrustedImageUrl(rose.imageUrl))
        .map((rose, index) => ({
          id: String(rose.id || `rose-${index + 1}`),
          name: String(rose.name),
          shape: String(rose.shape),
          rating: Number(rose.rating),
          shop: {
            country: String(rose.shop.country),
            name: String(rose.shop.name)
          },
          imageUrl: String(rose.imageUrl)
        }))
        .sort((a, b) => {
          const byRating = b.rating - a.rating;
          if (byRating !== 0) return byRating;

          const locationA = `${a.shop.country} ${a.shop.name}`;
          const locationB = `${b.shop.country} ${b.shop.name}`;
          const byLocation = locationA.localeCompare(locationB);
          if (byLocation !== 0) return byLocation;

          return a.name.localeCompare(b.name);
        });

    /*

    function addRoseToCart(rose) {
      if (!state.hasOrdered) {
        showToast("Order flowers first, then build your bouquet.");
        return;
      }

      const existing = state.cart.find((item) => item.id === rose.id);
      if (existing) {
        existing.quantity = Math.min(existing.quantity + 1, 99);
      } else {
        state.cart.push({
          id: rose.id,
          name: rose.name,
          imageUrl: rose.imageUrl,
          shape: rose.shape,
          rating: rose.rating,
          shop: {
            country: rose.shop.country,
            name: rose.shop.name

          quantity: 1

    function renderCart() {

      cartBadge.textContent = String(total);

      });

      checkoutButton.disabled = total === 0 || !state.hasOrdered || state.checkoutInProgress;

      if (total === 0) {
        cartStatus.textContent = "Cart is empty";

    function createCartItem(item) {
      const row = document.createElement("article");
      row.className = "cart-item";

      const image = document.createElement("img");
      image.className = "cart-thumb";
      image.loading = "lazy";
      image.decoding = "async";
      image.referrerPolicy = "no-referrer";

      const main = document.createElement("div");
      main.className = "cart-item-main";

      const name = document.createElement("h3");
      name.className = "cart-item-name";
      name.textContent = item.name;

      const meta = document.createElement("div");
      meta.className = "cart-item-meta";
      meta.textContent = `${item.shape} - ${item.rating.toFixed(1)} - ${item.shop.country}`;

      const controls = document.createElement("div");
      controls.className = "cart-controls";

      const quantity = document.createElement("div");
      quantity.className = "cart-quantity";
      quantity.setAttribute("aria-label", `Quantity for ${item.name}`);

      const decrement = document.createElement("button");
      decrement.className = "cart-quantity-btn";
      decrement.type = "button";
      decrement.setAttribute("aria-label", `Decrease ${item.name} quantity`);
      decrement.textContent = "-";
      decrement.addEventListener("click", () => updateCartQuantity(item.id, item.quantity - 1));

      const value = document.createElement("span");
      value.className = "cart-quantity-value";
      value.textContent = String(item.quantity);

      const increment = document.createElement("button");
      increment.className = "cart-quantity-btn";
      increment.type = "button";
      increment.setAttribute("aria-label", `Increase ${item.name} quantity`);
      increment.textContent = "+";
      increment.addEventListener("click", () => updateCartQuantity(item.id, item.quantity + 1));

      quantity.append(decrement, value, increment);

      const remove = document.createElement("button");
      remove.className = "remove-cart-btn";
      remove.type = "button";
      remove.textContent = "Remove";
      remove.addEventListener("click", () => removeFromCart(item.id));

      controls.append(quantity, remove);
      main.append(name, meta, controls);
      row.append(image, main);
      return row;
    }

    function updateCartQuantity(id, nextQuantity) {
      const item = state.cart.find((cartItem) => cartItem.id === id);
      if (!item) return;

      if (nextQuantity <= 0) {
        removeFromCart(id);
        return;
      }

      item.quantity = Math.min(nextQuantity, 99);
      saveCart();
      renderCart();
    }

    function removeFromCart(id) {
      state.cart = state.cart.filter((item) => item.id !== id);
      saveCart();
      renderCart();
    }

    function openCart() {
      cartPanel.classList.add("open");

    function closeCart() {
      cartPanel.classList.remove("open");
      cartBackdrop.classList.remove("open");

      cartToggle.setAttribute("aria-expanded", "false");

    function getCartTotal() {
      return state.cart.reduce((total, item) => total + item.quantity, 0);
    }

    function saveCart() {
      try {
        localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(state.cart));
      } catch (error) {
        showToast("Cart could not be saved in this browser.");
      }
    }

    function loadCart() {
      try {
        const parsed = JSON.parse(localStorage.getItem(CART_STORAGE_KEY) || "[]");
        if (!Array.isArray(parsed)) return [];
        return parsed.map(normalizeCartItem).filter(Boolean);
      } catch (error) {
        return [];
      }
    }

    function normalizeCartItem(item) {
      if (!item || !isTrustedImageUrl(item.imageUrl) || !item.shop) return null;

      const quantity = Math.max(1, Math.min(Number.parseInt(item.quantity, 10) || 1, 99));
      const rating = Number(item.rating);
      if (!Number.isFinite(rating)) return null;

      return {
        id: String(item.id || ""),
        name: String(item.name || "Rose").slice(0, 80),
        imageUrl: String(item.imageUrl),
        shape: String(item.shape || "rose").slice(0, 40),
        rating,
        shop: {
          country: String(item.shop.country || "Unknown").slice(0, 60),
          name: String(item.shop.name || "Flower shop").slice(0, 80)
        },
        quantity
      };
    }

    /*
      Checkout logic:
      JSZip creates one ZIP in the browser and FileSaver saves it. Each cart item is
      matched to the loaded catalog before fetch(), then downloaded with CORS. Failed
      image fetches are skipped while the rest of the bouquet continues.
    */
    async function checkoutCart() {
      const total = getCartTotal();
      if (total === 0) {
        openCart();
        showToast("Cart is empty");
        return;
      }

      if (!state.hasOrdered) {
        showToast("Order flowers before checkout.");
        return;
      }

      if (typeof JSZip !== "function") {
        showToast("ZIP library is still loading. Try again in a moment.");
        return;
      }

      state.checkoutInProgress = true;
      cartStatus.textContent = "Preparing your bouquet...";
      renderCart();
      showToast("Your bouquet is being prepared for download \uD83D\uDC96");

      const zip = new JSZip();
      const failedNames = [];
      let addedImages = 0;

      for (const item of state.cart) {
        const rose = getCatalogRoseById(item.id);
        if (!rose || rose.imageUrl !== item.imageUrl || !isTrustedImageUrl(rose.imageUrl)) {
          failedNames.push(item.name);
          continue;
        }

        try {
          const blob = await fetchRoseImageBlob(rose);
          const extension = imageExtension(blob, rose.imageUrl);
          const baseName = `${safeZipFileName(rose.name)}_${safeZipFileName(rose.id)}`;

          for (let copy = 1; copy <= item.quantity; copy += 1) {
            const copySuffix = item.quantity > 1 ? `_${copy}` : "";
            zip.file(`${baseName}${copySuffix}.${extension}`, blob);
            addedImages += 1;
          }
        } catch (error) {
          failedNames.push(item.name);
        }
      }

      try {
        if (addedImages === 0) {
          showToast("No cart images could be fetched for the ZIP.");
          return;
        }

        const zipBlob = await zip.generateAsync({
          type: "blob",
          compression: "DEFLATE",
          compressionOptions: { level: 6 }
        });

        saveZipBlob(zipBlob, "my_love_roses.zip");

        if (failedNames.length) {
          showToast(`Warning: ${failedNames.length} image${failedNames.length === 1 ? "" : "s"} skipped. ${addedImages} zipped.`);
        } else {
          showToast("Your bouquet ZIP is downloading.");
        }
      } finally {
        state.checkoutInProgress = false;
        renderCart();
      }
    }

    function getCatalogRoseById(id) {
      return state.roses.find((rose) => rose.id === id) || null;
    }

    async function fetchRoseImageBlob(rose) {
      const response = await fetch(rose.imageUrl, {
        method: "GET",
        mode: "cors",
        credentials: "omit",
        referrerPolicy: "no-referrer"
      });

      if (!response.ok) {
        throw new Error("Image download failed.");
      }

      const blob = await response.blob();
      if (!blob.type.startsWith("image/")) {
        throw new Error("Downloaded file is not an image.");
      }

      return blob;
    }

    function saveZipBlob(blob, fileName) {
      if (typeof saveAs === "function") {
        saveAs(blob, fileName);
        return;
      }

      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = objectUrl;
      link.download = fileName;
      document.body.append(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(objectUrl), 0);
    }

    function imageExtension(blob, imageUrl) {
      const type = blob.type.toLowerCase();
      if (type.includes("png")) return "png";
      if (type.includes("webp")) return "webp";
      if (type.includes("gif")) return "gif";
      if (type.includes("jpeg") || type.includes("jpg")) return "jpg";

      try {
        const path = new URL(imageUrl).pathname;
        const match = path.match(/\.([a-z0-9]{3,4})$/i);
        if (match && /^(jpe?g|png|webp|gif)$/i.test(match[1])) {
          return match[1].toLowerCase().replace("jpeg", "jpg");
        }
      } catch (error) {
        return "jpg";
      }

      return "jpg";
    }

    function safeZipFileName(value) {
      const cleaned = String(value)
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/gi, "_")
        .replace(/^_+|_+$/g, "");
      return cleaned || "rose";
    }

    /*
      Download function:
      The URL is parsed with the URL API, checked against trusted origins, fetched
      as a Blob, then downloaded through a temporary same-document anchor. No eval,
      no user-provided scriptable URL, and filenames are cleaned.
    */
    async function downloadRoseImage(rose) {
      if (!isTrustedImageUrl(rose.imageUrl)) {
        showToast("That image source is not trusted for download.");
        return;
      }

      try {
        const response = await fetch(rose.imageUrl, {
          method: "GET",
          mode: "cors",
          credentials: "omit",
          referrerPolicy: "no-referrer"
        });

        if (!response.ok) {
          throw new Error("Image download failed.");
        }

        const blob = await response.blob();
        if (!blob.type.startsWith("image/")) {
          throw new Error("Downloaded file is not an image.");
        }

        const objectUrl = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = objectUrl;
        link.download = `${safeFileName(rose.name)}.jpg`;
        document.body.append(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(objectUrl), 0);
        showToast(`${rose.name} is downloading.`);
      } catch (error) {
        // Fallback for browsers that block cross-origin blob downloads.
        const link = document.createElement("a");
        link.href = rose.imageUrl;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.download = `${safeFileName(rose.name)}.jpg`;
        document.body.append(link);
        link.click();
        link.remove();
        showToast("Opened the trusted image URL for download.");
      }
    }

    function addMaleMessage(message) {
      const row = document.createElement("div");
      row.className = "chat-row";

      const avatar = document.createElement("span");
      avatar.className = "avatar";
      avatar.setAttribute("aria-label", "Male speaker");
      avatar.textContent = "👨‍🦰";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = message;

      row.append(avatar, bubble);
      chatLog.append(row);
    }

    function addUserBubble(message) {
      const bubble = document.createElement("div");
      bubble.className = "bubble user";
      bubble.textContent = message;
      chatLog.append(bubble);
    }

    /*
      Security measures:
      User input is trimmed, normalized, length-limited, and rendered only via
      textContent. No innerHTML is used for untrusted data.
    */
    function sanitizeUserText(value) {
      return String(value || "")
        .normalize("NFKC")
        .replace(/[\u0000-\u001F\u007F]/g, "")
        .trim()
        .slice(0, 120);
    }

    function isTrustedImageUrl(value) {
      try {
        const url = new URL(String(value));
        return url.protocol === "https:" && TRUSTED_IMAGE_ORIGINS.has(url.origin);
      } catch (error) {
        return false;
      }
    }

    function safeFileName(value) {
      const cleaned = String(value)
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/gi, "-")
        .replace(/^-+|-+$/g, "")
        .toLowerCase();
      return cleaned || "rose";
    }

    function starRating(rating) {
      const fullStars = Math.max(1, Math.min(5, Math.round(rating)));
      return "★".repeat(fullStars) + "☆".repeat(5 - fullStars);
    }

    function showToast(message) {
      window.clearTimeout(state.toastTimer);
      toast.textContent = message;
      toast.classList.add("show");
      state.toastTimer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 3600);
    }
  </script>
</body>
